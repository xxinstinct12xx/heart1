<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Heart Animation</title>
        <link rel="stylesheet" href="style.css">
</head>

<body>
        <div id="startScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; align-items: center; justify-content: center; font-size: 2em; cursor: pointer; z-index: 10;">Click to Play</div>
        <canvas id="heart"></canvas>
        <audio id="bgMusic" loop preload="auto">
            <source src="music.mp3" type="audio/mpeg">
            <source src="music.ogg" type="audio/ogg">
            Your browser does not support the audio element.
        </audio>
        <script src="script.js"></script>
</body>
</html>
